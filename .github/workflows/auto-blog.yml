name: Auto Blog Publish

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check required secrets
        id: preflight
        shell: bash
        run: |
          if [[ -z "$OPENAI_API_KEY" || -z "$OPENAI_MODEL" ]]; then
            echo "Auto blog skipped: OPENAI_API_KEY or OPENAI_MODEL is missing."
            echo "run_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$SERPAPI_KEY" && ( -z "$GOOGLE_API_KEY" || -z "$GOOGLE_CSE_ID" ) ]]; then
            echo "Auto blog skipped: SERPAPI_KEY or GOOGLE_API_KEY + GOOGLE_CSE_ID is missing."
            echo "run_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_publish=true" >> "$GITHUB_OUTPUT"
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Write and deploy
        if: steps.preflight.outputs.run_publish == 'true'
        run: npm run auto-blog:publish
        env:
          SEARCH_KEYWORD: ${{ vars.SEARCH_KEYWORD || '부동산' }}
          POST_CATEGORY: ${{ vars.POST_CATEGORY || '부동산' }}
          POST_OUTPUT_DIR: posts
          MAX_REFERENCE_RESULTS: ${{ vars.MAX_REFERENCE_RESULTS || '10' }}
          POST_MIN_CHARS: ${{ vars.POST_MIN_CHARS || '2000' }}
          POST_MAX_CHARS: ${{ vars.POST_MAX_CHARS || '4000' }}
          SMARTSTORE_URL: ${{ vars.SMARTSTORE_URL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || '6bb4af2f-7707-45cb-9c15-4848c3017c34' }}
