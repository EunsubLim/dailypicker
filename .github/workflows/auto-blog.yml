name: Auto Blog Publish

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Write post and push
        run: npm run auto-blog:publish
        env:
          FREE_AUTO_BLOG: ${{ vars.FREE_AUTO_BLOG || '1' }}
          SKIP_NETLIFY_DEPLOY: '1'
          SEARCH_KEYWORD: ${{ vars.SEARCH_KEYWORD || '부동산' }}
          POST_CATEGORY: ${{ vars.POST_CATEGORY || '부동산' }}
          POST_OUTPUT_DIR: posts
          MAX_REFERENCE_RESULTS: ${{ vars.MAX_REFERENCE_RESULTS || '10' }}
          POST_MIN_CHARS: ${{ vars.POST_MIN_CHARS || '2000' }}
          POST_MAX_CHARS: ${{ vars.POST_MAX_CHARS || '4000' }}
          SMARTSTORE_URL: ${{ vars.SMARTSTORE_URL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || '6bb4af2f-7707-45cb-9c15-4848c3017c34' }}
