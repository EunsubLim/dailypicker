name: Netlify Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare deploy folder
        run: node scripts/prepare-deploy.mjs

      - name: Deploy to Netlify
        run: npx --yes netlify-cli@latest deploy --prod --dir .deploy --site 6bb4af2f-7707-45cb-9c15-4848c3017c34 --auth "$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
